# Ruff config (lint + format). See https://docs.astral.sh/ruff/
line-length = 100
target-version = "py313"

[lint]
# E/F = pyflakes+pycodestyle, I = isort, UP = pyupgrade, B = bugbear
select = ["E", "F", "I", "UP", "B"]

[lint.per-file-ignores]
# voice_input.py registers CUDA DLL dirs before importing ctranslate2/faster-whisper,
# so some third-party imports intentionally sit below that setup call.
"voice_input.py" = ["E402"]
